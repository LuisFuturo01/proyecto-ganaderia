        .btn-reset {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 12px 24px;
            border-radius: 12px;

        @keyframes breath {

        }

        @keyframes rotate-icon {
            0% { transform: rotate(0deg); }

        @keyframes fadeIn {

<body>

    <div id="root"></div>

    <!-- CÓDIGO REACT Y THREE.JS CON TRANSPILADOR BABEL IN-BROWSER -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ====================================================================
        // COMPONENTE: GEMELO DIGITAL 3D (THREE.JS)
        // ====================================================================
        function GemeloDigital3D({ textureUrl, tipo }) {
            const canvasRef = useRef(null);
            const rendererRef = useRef(null);
            const sceneRef = useRef(null);
            const meshRef = useRef(null);
            const textureLoaderRef = useRef(new THREE.TextureLoader());

            useEffect(() => {
                if (!canvasRef.current) return;

                // 1. Inicializar Escena
                const scene = new THREE.Scene();
                sceneRef.current = scene;

                // 2. Configurar Cámara
                const width = canvasRef.current.clientWidth || 300;
                const height = canvasRef.current.clientHeight || 300;
                const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 100);
                camera.position.set(0, 0, 4);

                // 3. Configurar Renderizador WebGL
                const renderer = new THREE.WebGLRenderer({
                    canvas: canvasRef.current,
                    antialias: true,
                    alpha: true
                });
                renderer.setSize(width, height);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                rendererRef.current = renderer;

                // 4. Luces
                const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
                scene.add(ambientLight);

                const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
                dirLight1.position.set(5, 5, 5);
                scene.add(dirLight1);

                const dirLight2 = new THREE.DirectionalLight(0x8b5cf6, 0.5);
                dirLight2.position.set(-5, -5, 2);
                scene.add(dirLight2);

                // 5. Geometría Inteligente segun el tipo de Alimento
                let geometry;
                const isPotato = tipo && (tipo.toLowerCase() === 'papa' || tipo.toLowerCase() === 'potato');

                if (isPotato) {
                    // Geometría elipsoide irregular de papa
                    geometry = new THREE.SphereGeometry(1.2, 40, 40);
                    const position = geometry.attributes.position;
                    for (let i = 0; i < position.count; i++) {
                        const x = position.getX(i);
                        const y = position.getY(i);
                        const z = position.getZ(i);
                        
                        // Elongar en el eje Y y añadir distorsiones orgánicas
                        position.setY(i, y * 1.3);
                        const factor = 1 + Math.sin(y * 2) * 0.08 + Math.cos(x * 3) * 0.04;
                        position.setX(i, x * factor);
                        position.setZ(i, z * factor);
                    }
                    geometry.computeVertexNormals();
                } else {
                    // Geometría de manzana con hendiduras
                    geometry = new THREE.SphereGeometry(1.2, 40, 40);
                    const position = geometry.attributes.position;
                    for (let i = 0; i < position.count; i++) {
                        const x = position.getX(i);
                        const y = position.getY(i);
                        const z = position.getZ(i);
                        
                        // Hendiduras características en la parte superior e inferior
                        const factor = 1.0 - 0.12 * Math.exp(-y * y * 4);
                        position.setX(i, x * factor);
                        position.setZ(i, z * factor);
                    }
                    geometry.computeVertexNormals();
                }

                // 6. Material de alta fidelidad con soporte para texturas
                const material = new THREE.MeshStandardMaterial({
                    roughness: 0.6,
                    metalness: 0.1,
                    bumpScale: 0.05
                });

                const mesh = new THREE.Mesh(geometry, material);
                scene.add(mesh);
                meshRef.current = mesh;

                // 7. Controles de Órbita OrbitControls
                const controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.05;
                controls.maxDistance = 6;
                controls.minDistance = 2;

                // 8. Bucle de Animación
                let animationFrameId;
                const animate = () => {
                    controls.update();
                    if (meshRef.current) {
                        meshRef.current.rotation.y += 0.003; // Rotación lenta y natural
                    }
                    renderer.render(scene, camera);
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();

                // 9. Resize Handler
                const handleResize = () => {
                    if (!canvasRef.current || !rendererRef.current) return;
                    const w = canvasRef.current.parentNode.clientWidth;
                    const h = canvasRef.current.parentNode.clientHeight;
                    camera.aspect = w / h;
                    camera.updateProjectionMatrix();
                    rendererRef.current.setSize(w, h);
                };
                window.addEventListener('resize', handleResize);

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', handleResize);
                    geometry.dispose();
                    material.dispose();
                    controls.dispose();
                };
            }, [tipo]);

            // Carga y mapeo dinámico de la textura cuando se genera
            useEffect(() => {
                if (!meshRef.current || !textureUrl) return;

                textureLoaderRef.current.load(
                    textureUrl,
                    (texture) => {
                        texture.wrapS = THREE.RepeatWrapping;
                        texture.wrapT = THREE.ClampToEdgeWrapping;
                        meshRef.current.material.map = texture;
                        meshRef.current.material.needsUpdate = true;
                        console.log("Textura 36D cargada con éxito en el canvas Three.js:", textureUrl);
                    },
                    undefined,
                    (err) => console.error("Error cargando textura 3D en Three.js:", err)
                );
            }, [textureUrl]);

            return (
                <div style={{ width: '100%', height: '300px', position: 'relative', overflow: 'hidden', borderRadius: '12px', background: 'rgba(0,0,0,0.3)', border: '1px solid var(--glass-border)' }}>
                    <canvas ref={canvasRef} style={{ width: '100%', height: '100%', display: 'block' }} />
                    <div style={{ position: 'absolute', bottom: '10px', left: '50%', transform: 'translateX(-50%)', fontSize: '11px', color: 'var(--text-muted)', pointerEvents: 'none', background: 'rgba(0,0,0,0.6)', padding: '4px 10px', borderRadius: '20px', display: 'flex', gap: '8px' }}>
                        <span>🖱️ Arrastrar para rotar</span>
                        <span>|</span>
                        <span>🔍 Rueda para zoom</span>
                    </div>
                </div>
            );
        }

        // ====================================================================
        // COMPONENTE: APLICACIÓN PRINCIPAL (REACT)
        // ====================================================================
        function App() {
            const [wsConnected, setWsConnected] = useState(false);
            const [analisisData, setAnalisisData] = useState(null);

            useEffect(() => {
                let ws;
                const connect = () => {
                    ws = new WebSocket("ws://localhost:8000/ws");
                    
                    ws.onopen = () => {
                        setWsConnected(true);
                        console.log("WebSocket Conectado!");
                    };

                    ws.onmessage = (event) => {
                        try {
                            const data = JSON.parse(event.data);
                            setAnalisisData(data);
                        } catch (e) {
                            console.error("Error parseando datos WebSocket:", e);
                        }
                    };

                    ws.onclose = () => {
                        setWsConnected(false);
                        console.log("WebSocket desconectado, reconectando...");
                        setTimeout(connect, 3000);
                    };
                };

                connect();
                return () => {
                    if (ws) ws.close();
                };
            }, []);

            const resetDashboard = () => {
                setAnalisisData(null);
            };

            // Conversión HSV a HSL básico para swatches de color epidérmico
            const getSwatchColor = (tipo, hsv) => {
                if (!hsv) return 'rgba(0,0,0,0.2)';
                const h = hsv[0] * 2; // HSV H de OpenCV es 0-180, en CSS HSL es 0-360
                const s = hsv[1] / 2.55;
                const v = hsv[2] / 2.55;
                
                // Aproximación rápida a HSL
                let l = (2 - s / 100) * v / 2;
                let sat = s * v / (l < 50 ? l * 2 : 200 - l * 2);
                if (isNaN(sat)) sat = 0;
                
                return `hsl(${h}, ${sat}%, ${l}%)`;
            };

            return (
                <React.Fragment>
                    <header>
                        <div className="logo-container">
                            <div className="logo-icon">iA</div>
                            <div className="logo-title">
                                <h1>iA Ganadería & Control</h1>
                                <p>Gemelo Digital 3D React & Three.js</p>
                            </div>
                        </div>
                        <div className="status-badge">
                            <div className={`status-dot ${wsConnected ? 'online' : ''}`}></div>
                            <span>{wsConnected ? "Conectado Real-Time" : "Desconectado. Intentando conectar..."}</span>
                        </div>
                    </header>

                    <main>
                        {!analisisData ? (
                            <div className="waiting-card">
                                <div className="pulse-scanner">
                                    <div className="pulse-circle"></div>
                                    <div className="pulse-circle-inner">
                                        <svg viewBox="0 0 24 24">
                                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/>
                                        </svg>
                                    </div>
                                </div>
                                <h2 className="waiting-title">Esperando Escaneo 360 en Cámara Local...</h2>
                                <p className="waiting-desc">
                                    Por favor, presiona la tecla <strong>C</strong> en la ventana de cámara abierta localmente para capturar los cuadrantes. Al completarse, el backend inyectará de forma automática el modelo 3D y las simulaciones en este panel en tiempo real.
                                </p>
                            </div>
                        ) : (
                            <div className="dashboard-container">
                                {/* COLUMNA IZQUIERDA: GEMELO 3D E IA */}
                                <div className="dashboard-column">
                                    {/* GEMELO DIGITAL 3D */}
                                    <div className="dashboard-card">
                                        <h3 className="card-title">
                                            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                            Gemelo Digital 3D (Render Interactiva)
                                        </h3>
                                        <GemeloDigital3D 
                                            textureUrl={analisisData.geometria_espacial_3d.ruta_imagen_plana_textura !== "No disponible" ? `/${analisisData.geometria_espacial_3d.ruta_imagen_plana_textura}` : null}
                                            tipo={analisisData.clasificacion_alimento.tipo_item_detectado}
                                        />
                                    </div>

                                    {/* CLASIFICACIÓN IA */}
                                    <div className="dashboard-card">
                                        <div className="card-header-area">
                                            <h3 className="card-title">
                                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                                                Clasificación de Alimento (Inferencia v3)
                                            </h3>
                                            <span className="badge badge-primary">{analisisData.clasificacion_alimento.tipo_item_detectado.toUpperCase()}</span>
                                        </div>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Vegetal Detectado</span>
                                                <span className="metric-value">{analisisData.clasificacion_alimento.tipo_item_detectado.toUpperCase()}</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Confianza del Modelo</span>
                                                <span className="metric-value metric-highlight">
                                                    {(analisisData.clasificacion_alimento.puntaje_confianza_modelo * 100).toFixed(1)}%
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* COLOR Y EPIDERMIS */}
                                    <div className="dashboard-card">
                                        <h3 className="card-title">
                                            <svg viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9 0 2.12.74 4.07 1.97 5.61L4.35 19.4c-.39.39-.39 1.02 0 1.41.39.39 1.02.39 1.41 0l1.9-1.9C9.17 19.57 10.53 20 12 20c4.97 0 9-4.03 9-9s-4.03-9-9-9zm0 15c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>
                                            Análisis Colorimétrico y Epidermis
                                        </h3>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Espacio Color HSV Promedio</span>
                                                <span className="metric-value">
                                                    [{analisisData.analisis_color_superficie.espacio_color_hsv_promedio.join(', ')}]
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Manchas de Daño Aisladas</span>
                                                <span className="metric-value">{analisisData.analisis_color_superficie.conteo_manchas_aisladas}</span>
                                            </div>
                                        </div>
                                        <div className="metric-block">
                                            <span className="metric-label">Previsualización Epidérmica Estabilizada</span>
                                            <div className="color-preview-block" style={{ backgroundColor: getSwatchColor(analisisData.clasificacion_alimento.tipo_item_detectado, analisisData.analisis_color_superficie.espacio_color_hsv_promedio) }}>
                                                HSV: [{analisisData.analisis_color_superficie.espacio_color_hsv_promedio.join(', ')}]
                                            </div>
                                        </div>
                                        <div className="metric-block">
                                            <div className="card-header-area" style={{ marginBottom: '5px' }}>
                                                <span className="metric-label">Superficie Epidermis Dañada</span>
                                                <span className="metric-value" style={{ fontSize: '14px', fontWeight: '600' }}>
                                                    {analisisData.analisis_color_superficie.porcentaje_superficie_piel_danada.toFixed(1)}%
                                                </span>
                                            </div>
                                            <div className="progress-bar-container">
                                                <div 
                                                    className="progress-bar-fill" 
                                                    style={{ 
                                                        width: `${analisisData.analisis_color_superficie.porcentaje_superficie_piel_danada}%`,
                                                        background: analisisData.analisis_color_superficie.porcentaje_superficie_piel_danada > 30 
                                                            ? 'linear-gradient(90deg, #ef4444 0%, #f43f5e 100%)'
                                                            : analisisData.analisis_color_superficie.porcentaje_superficie_piel_danada > 10
                                                            ? 'linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%)'
                                                            : 'linear-gradient(90deg, var(--success) 0%, #34d399 100%)'
                                                    }}
                                                ></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* MÉTRICAS GEOMÉTRICAS */}
                                    <div className="dashboard-card">
                                        <h3 className="card-title">
                                            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                                            Dimensiones y Volumen Espacial
                                        </h3>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Volumen Calculado</span>
                                                <span className="metric-value">{analisisData.geometria_espacial_3d.volumen_calculado_cm3.toFixed(1)} cm³</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Área de Superficie</span>
                                                <span className="metric-value">{analisisData.geometria_espacial_3d.area_superficie_calculada_cm2.toFixed(1)} cm²</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Índice de Esfericidad</span>
                                                <span className="metric-value">{analisisData.geometria_espacial_3d.indice_forma_esfericidad.toFixed(2)}</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Caja Delimitadora (cm)</span>
                                                <span className="metric-value" style={{ fontSize: '15px' }}>
                                                    {analisisData.geometria_espacial_3d.dimensiones_caja_borde_cm.ancho} x {analisisData.geometria_espacial_3d.dimensiones_caja_borde_cm.alto} x {analisisData.geometria_espacial_3d.dimensiones_caja_borde_cm.espesor_profundidad_estimada}
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* LOTE DE FOTOS 360 */}
                                    <div className="dashboard-card">
                                        <h3 className="card-title">
                                            <svg viewBox="0 0 24 24"><path d="M4 4h7v7H4zm10 0h7v7h-7zM4 14h7v7H4zm10 0h7v7h-7z"/></svg>
                                            Lote de Capturas Originales (Matriz 2x2 Divisoria)
                                        </h3>
                                        <div className="metric-block" style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'rgba(0,0,0,0.3)', border: '1px solid var(--glass-border)', borderRadius: '12px', minHeight: '180px', padding: '10px' }}>
                                            {analisisData.geometria_espacial_3d.ruta_imagen_agrupada !== "No disponible" ? (
                                                <img 
                                                    src={`/${analisisData.geometria_espacial_3d.ruta_imagen_agrupada}`} 
                                                    alt="Lote 2x2" 
                                                    style={{ maxWidth: '100%', maxHeight: '250px', borderRadius: '8px', objectFit: 'contain', boxShadow: '0 4px 15px rgba(0,0,0,0.5)' }} 
                                                />
                                            ) : (
                                                <span style={{ color: 'var(--text-muted)', fontSize: '14px' }}>Matriz de imágenes no disponible.</span>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* COLUMNA DERECHA: DOSIMETRÍA Y FINANZAS */}
                                <div className="dashboard-column">
                                    {/* DOSIMETRÍA NUCLEAR */}
                                    <div className="dashboard-card">
                                        <div className="card-header-area">
                                            <h3 className="card-title">
                                                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                                                Planificación de Dosimetría Nuclear
                                            </h3>
                                            <span className="badge badge-success">{analisisData.simulacion_dosimetria_radiacion.proposito_fitosanitario_asignado}</span>
                                        </div>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Dosis de Superficie Planificada</span>
                                                <span className="metric-value metric-highlight">
                                                    {analisisData.simulacion_dosimetria_radiacion.dosis_superficie_objetivo_kGy.toFixed(3)} kGy
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Reducción Microbiana</span>
                                                <span className="metric-value">
                                                    {analisisData.simulacion_dosimetria_radiacion.indicadores_dosimetria_fisico_biologica.reduccion_logaritmica_carga_bacteriana.toFixed(1)} Log
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Uniformidad Dmax/Dmin</span>
                                                <span className="metric-value">
                                                    {analisisData.simulacion_dosimetria_radiacion.indicadores_dosimetria_fisico_biologica.uniformidad_dosis_ratio_Dmax_Dmin.toFixed(2)} : 1
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Energía Absorbida Total</span>
                                                <span className="metric-value">
                                                    {analisisData.simulacion_dosimetria_radiacion.indicadores_dosimetria_fisico_biologica.energia_depositada_total_Joules.toFixed(1)} J
                                                </span>
                                            </div>
                                        </div>
                                        <div className="metric-block">
                                            <span className="metric-label">Atenuación Radial de Energía hacia el Núcleo (8 Capas)</span>
                                            <div className="layers-visualization">
                                                {analisisData.simulacion_dosimetria_radiacion.perfil_atenuacion_profundidad_lineal_kGy.map((layerDose, idx) => {
                                                    const opacity = (layerDose / analisisData.simulacion_dosimetria_radiacion.dosis_superficie_objetivo_kGy).toFixed(2);
                                                    return (
                                                        <div 
                                                            key={idx}
                                                            className="layer-box"
                                                            style={{ backgroundColor: `rgba(139, 92, 246, ${opacity})` }}
                                                            title={`Capa ${idx+1}: ${layerDose.toFixed(3)} kGy`}
                                                        />
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    </div>

                                    {/* VIDA ÚTIL */}
                                    <div className="dashboard-card">
                                        <div className="card-header-area">
                                            <h3 className="card-title">
                                                <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
                                                Cinética de Conservación Post-Irradiación
                                            </h3>
                                            <span className={`badge ${analisisData.prediccion_vida_util_post_irradiacion.dias_vida_util_restante > 40 ? 'badge-success' : 'badge-warning'}`}>
                                                {analisisData.prediccion_vida_util_post_irradiacion.estado_proyeccion}
                                            </span>
                                        </div>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Días de Conservación Proyectados</span>
                                                <span className="metric-value metric-highlight">
                                                    {analisisData.prediccion_vida_util_post_irradiacion.dias_vida_util_restante} días
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Días Extra Ganados (SciML)</span>
                                                <span className="metric-value">
                                                    +{analisisData.prediccion_vida_util_post_irradiacion.dias_ganados_por_irradiacion} días
                                                </span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* SIMULACIÓN FINANCIERA B2B */}
                                    <div className="dashboard-card">
                                        <h3 className="card-title">
                                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H7c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.04-.42 1.99-1.07 2.75z"/></svg>
                                            Impacto Comercial & Planta B2B
                                        </h3>
                                        <div className="grid-2">
                                            <div className="metric-block">
                                                <span className="metric-label">Dosis Estándar Industrial</span>
                                                <span className="metric-value">{analisisData.simulacion_impacto_financiero_operativo.dosis_estandar_industria_kGy.toFixed(2)} kGy</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Tiempo de Cinta Optimizado</span>
                                                <span className="metric-value">{analisisData.simulacion_impacto_financiero_operativo.tiempo_procesamiento_ahorrado_segundos.toFixed(1)} s</span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Ahorro por Unidad Procesada</span>
                                                <span className="metric-value" style={{ fontSize: '16px' }}>
                                                    ${analisisData.simulacion_impacto_financiero_operativo.ahorro_directo_por_unidad_usd.toFixed(4)} USD
                                                </span>
                                            </div>
                                            <div className="metric-block">
                                                <span className="metric-label">Eficiencia Operativa Total</span>
                                                <span className="metric-value metric-highlight">
                                                    {analisisData.simulacion_impacto_financiero_operativo.porcentaje_optimizacion_throughput.toFixed(1)}%
                                                </span>
                                            </div>
                                        </div>
                                        <div className="metric-block" style={{ background: 'rgba(139, 92, 246, 0.05)', borderColor: 'rgba(139, 92, 246, 0.15)' }}>
                                            <span className="metric-label" style={{ color: 'var(--primary)' }}>Ahorro Proyectado por Tonelada</span>
                                            <span className="metric-value" style={{ fontSize: '26px', fontWeight: '800', color: '#a78bfa' }}>
                                                ${analisisData.simulacion_impacto_financiero_operativo.ahorro_proyectado_por_tonelada_usd.toFixed(2)} USD
                                            </span>
                                        </div>

                                        <button className="btn-reset" onClick={resetDashboard}>Esperar Siguiente Escaneo</button>
                                    </div>
                                </div>

                                {/* CONTRATO JSON EN BRUTO */}
                                <div className="dashboard-card" style={{ gridColumn: 'span 2', marginTop: '16px' }}>
                                    <h3 className="card-title">
                                        <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                                        Contrato de Datos de la API (JSON Crudo Recibido)
                                    </h3>
                                    <div style={{ background: 'rgba(0,0,0,0.4)', border: '1px solid var(--glass-border)', borderRadius: '12px', padding: '20px', fontFamily: 'monospace', fontSize: '13px', maxHeight: '400px', overflowY: 'auto', color: '#a78bfa', whiteSpace: 'pre-wrap', textAlign: 'left' }}>
                                        {JSON.stringify(analisisData, null, 4)}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </React.Fragment>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
